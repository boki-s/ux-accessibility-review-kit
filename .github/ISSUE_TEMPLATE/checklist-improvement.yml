name: Checklist improvement
description: Suggest a new checklist item or improve an existing one.
title: "[Checklist]: "
labels:
  - checklist
  - enhancement
body:
  - type: input
    id: category
    attributes:
      label: Category
      placeholder: Forms, Keyboard, Responsive, Content, etc.
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested checklist item
      description: Write the proposed item in plain language.
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: Why this helps
      description: Explain what problem this item would help reviewers catch.
    validations:
      required: true
  - type: input
    id: reference
    attributes:
      label: Optional reference
      placeholder: WCAG link, article, example, or design-system guidance
