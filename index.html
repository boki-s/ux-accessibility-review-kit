<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>UX Accessibility Review Kit</title>
    <link rel="stylesheet" href="src/styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="intro">
        <p class="eyebrow">Open-source UX tool</p>
        <h1>UX Accessibility Review Kit</h1>
        <p>
          A practical checklist for reviewing interfaces before handoff,
          launch, or portfolio publication.
        </p>
      </header>

      <section class="toolbar" aria-label="Checklist filters">
        <label>
          Category
          <select id="categoryFilter">
            <option value="all">All categories</option>
          </select>
        </label>
        <button id="resetButton" type="button">Reset checks</button>
      </section>

      <section class="summary" aria-live="polite">
        <strong id="completedCount">0</strong>
        <span>checks completed</span>
      </section>

      <section id="checklist" class="checklist" aria-label="Review checklist"></section>
    </main>

    <script src="src/app.js"></script>
  </body>
</html>
